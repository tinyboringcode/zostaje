services:
  zostaje:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zostaje
    restart: unless-stopped
    environment:
      DATABASE_URL: file:/data/prod.db
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NODE_ENV: production
      PLAN: ${PLAN:-free}
    volumes:
      - zostaje-data:/data
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.zostaje.rule=Host(`${DOMAIN:-zostaje.demo.boringcode.com}`)"
      - "traefik.http.routers.zostaje.entrypoints=websecure"
      - "traefik.http.routers.zostaje.tls=true"
      - "traefik.http.routers.zostaje.tls.certresolver=letsencrypt"
      - "traefik.http.services.zostaje.loadbalancer.server.port=3000"
    networks:
      - proxy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s

volumes:
  zostaje-data:
    driver: local

networks:
  proxy:
    external: true
