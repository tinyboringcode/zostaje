name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-beta"
      - "v*.*.*-alpha"

permissions:
  contents: write
  packages: write

jobs:
  # ── Build & publish Docker image ─────────────────────────────────────────
  docker:
    name: Docker image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Build Electron installers ─────────────────────────────────────────────
  electron-mac:
    name: Electron (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-mac
          path: dist/*.dmg

  electron-win:
    name: Electron (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-win
          path: dist/*.exe

  electron-linux:
    name: Electron (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run electron:build
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: electron-linux
          path: dist/*.AppImage

  # ── Create GitHub Release ─────────────────────────────────────────────────
  release:
    name: GitHub Release
    needs: [docker, electron-mac, electron-win, electron-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate changelog
        id: changelog
        run: |
          PREV_TAG=$(git tag --sort=-version:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            RANGE="HEAD"
          else
            RANGE="${PREV_TAG}..HEAD"
          fi
          echo "CHANGELOG<<EOF" >> $GITHUB_OUTPUT
          git log $RANGE --pretty=format:"- %s (%an)" --no-merges >> $GITHUB_OUTPUT
          echo "" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: zostaje. ${{ github.ref_name }}
          body: |
            ## Co nowego w ${{ github.ref_name }}

            ${{ steps.changelog.outputs.CHANGELOG }}

            ---

            ### Instalacja

            | Platforma | Plik |
            |-----------|------|
            | macOS | `.dmg` |
            | Windows | `.exe` (installer) |
            | Linux | `.AppImage` |
            | Docker / serwer | `ghcr.io/${{ github.repository }}:${{ github.ref_name }}` |

            ### Docker (serwer)
            ```bash
            docker pull ghcr.io/${{ github.repository }}:${{ github.ref_name }}
            ```
          files: |
            artifacts/electron-mac/*.dmg
            artifacts/electron-win/*.exe
            artifacts/electron-linux/*.AppImage
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}

  # ── Deploy to VPS (Traefik) ───────────────────────────────────────────────
  deploy:
    name: Deploy to VPS
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /opt/zostaje

            # Pull latest code
            git pull origin main

            # Write .env (overwrite on each deploy)
            cat > .env <<'ENVEOF'
            NEXTAUTH_SECRET=${{ secrets.NEXTAUTH_SECRET }}
            DOMAIN=zostaje.demo.boringcode.com
            PLAN=free
            ENVEOF

            # Rebuild and restart
            docker compose build --no-cache
            docker compose down --remove-orphans
            docker compose up -d

            # Cleanup dangling images
            docker image prune -f
